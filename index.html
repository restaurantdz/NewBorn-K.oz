<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Newborn K.oz | Officiel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dark-brown: #3d2b1f; /* Marron Foncé */
            --amber: #d4a373;      /* Marron Clair / Ambre */
            --bg: #1a0f0a;         /* Noir Chocolat */
            --white: #fdfaf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--white); min-height: 100vh; }

        /* --- ACCUEIL --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, var(--dark-brown), var(--bg));
            min-height: 100vh;
        }

        .logo-box {
            width: 140px; height: 140px;
            border: 3px solid var(--amber);
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 20px;
            background: #000;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 1.8rem; color: var(--amber); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 35px; }

        /* --- SYSTÈME DE CASES (TUILES) --- */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
            max-width: 380px;
        }

        .tile {
            background: var(--dark-brown);
            border: 1px solid var(--amber);
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--white);
            display: flex;
            align-items: center;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .tile i { font-size: 1.4rem; color: var(--amber); margin-right: 18px; width: 25px; text-align: center; }

        /* --- SOUS-CASES CONTACT (CACHÉES PAR DÉFAUT) --- */
        #contact-sub-menu {
            display: none; /* Caché au départ */
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: 12px;
        }

        .sub-tile {
            background: rgba(212, 163, 115, 0.1); /* Plus léger pour différencier */
            border: 1px dashed var(--amber);
        }

        /* --- SECTIONS (MENU & RÉSA) --- */
        .page-section { display: none; padding: 40px 20px; }
        .back-btn { color: var(--amber); text-decoration: none; display: inline-block; margin-bottom: 25px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .section-title { color: var(--amber); margin-bottom: 30px; text-align: center; text-transform: uppercase; }

        /* FORMULAIRE */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--amber); font-size: 0.9rem; }
        input, select { 
            width: 100%; height: 50px; background: #000; border: 1px solid var(--amber); 
            color: white; border-radius: 8px; padding: 0 15px; font-size: 1rem;
        }
        .submit-btn { 
            width: 100%; height: 55px; background: var(--amber); color: var(--dark-brown); 
            border: none; border-radius: 8px; font-weight: 900; margin-top: 10px; cursor: pointer;
        }

        .menu-img { width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--amber); }

        footer { text-align: center; padding: 30px; opacity: 0.5; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="home-page" class="hero">
        <div class="logo-box">
            <img src="https://img.freepik.com/vecteurs-premium/logo-tigre-mangeant-pizza_594445-356.jpg" alt="Logo Tigre Pizza">
        </div>
        <h1>Newborn K.oz</h1>

        <div class="grid-container">
            <div onclick="showSection('menu-page')" class="tile">
                <i class="fas fa-pizza-slice"></i><span>Consulter le Menu</span>
            </div>

            <div onclick="showSection('res-page')" class="tile">
                <i class="fas fa-chair"></i><span>Réservation de table</span>
            </div>

            <div onclick="toggleContact()" class="tile">
                <i class="fas fa-address-book"></i><span>Contact</span>
            </div>

            <div id="contact-sub-menu">
                <a href="https://www.instagram.com/newbornk.oz" target="_blank" class="tile sub-tile">
                    <i class="fab fa-instagram"></i><span>Instagram</span>
                </a>
                <a href="tel:+213659235094" class="tile sub-tile">
                    <i class="fas fa-phone"></i><span>Appeler</span>
                </a>
            </div>

            <a href="https://maps.google.com/?cid=2049670931405073807&g_mp=Cidnb29nbGUubWFwcy5wbGFjZXMudjEuUGxhY2VzLlNlYXJjaFRleHQ0" target="_blank" class="tile">
                <i class="fas fa-map-marker-alt"></i><span>Localisation</span>
            </a>
        </div>
    </div>

    <div id="menu-page" class="page-section">
        <div onclick="showSection('home-page')" class="back-btn">← Retour à l'accueil</div>
        <h2 class="section-title">Notre Menu</h2>
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800" class="menu-img">
        <img src="https://images.unsplash.com/photo-1593504049359-74330189a355?w=800" class="menu-img">
    </div>

    <div id="res-page" class="page-section">
        <div onclick="showSection('home-page')" class="back-btn">← Retour</div>
        <h2 class="section-title">Réservation</h2>
        <form id="resForm">
            <div class="form-group">
                <label>Nom complet</label>
                <input type="text" id="custName" required>
            </div>
            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;"><label>Jour</label><input type="date" id="resDate" required></div>
                <div class="form-group" style="flex:1;"><label>Heure</label><input type="time" id="resTime" required></div>
            </div>
            <div class="form-group">
                <label>Nombre de personnes</label>
                <select id="resPeople">
                    <script>
                        for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i} ${i>1?'Personnes':'Personne'}</option>`);
                    </script>
                </select>
            </div>
            <button type="submit" class="submit-btn">Confirmer sur WhatsApp</button>
        </form>
    </div>

    <footer><p>© 2026 Newborn K.oz - Alger Centre</p></footer>

    <script>
        // NAVIGATION
        function showSection(id) {
            document.getElementById('home-page').style.display = (id === 'home-page') ? 'flex' : 'none';
            document.getElementById('menu-page').style.display = (id === 'menu-page') ? 'block' : 'none';
            document.getElementById('res-page').style.display = (id === 'res-page') ? 'block' : 'none';
            // Fermer le sous-menu contact quand on change de page
            document.getElementById('contact-sub-menu').style.display = 'none';
            window.scrollTo(0,0);
        }

        // GESTION DU CONTACT (OUVRIR LES 2 CASES)
        function toggleContact() {
            let subMenu = document.getElementById('contact-sub-menu');
            if (subMenu.style.display === 'flex') {
                subMenu.style.display = 'none';
            } else {
                subMenu.style.display = 'flex';
            }
        }

        // WHATSAPP
        document.getElementById('resForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const n = document.getElementById('custName').value;
            const d = document.getElementById('resDate').value;
            const t = document.getElementById('resTime').value;
            const p = document.getElementById('resPeople').value;
            const msg = `Réservation :\nNom: ${n}\nDate: ${d}\nHeure: ${t}\nPersonnes: ${p}`;
            window.open(`https://wa.me/213659235094?text=${encodeURIComponent(msg)}`, '_blank');
        });
    </script>
</body>
</html>
