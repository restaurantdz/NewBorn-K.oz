<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Newborn K.oz | Menu Final</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0a1f44;
            --bg-color: #fdfdfd;
            --card-bg: #ffffff;
            --accent-grey: #eeeeee;
            --text-main: #333333;
            --text-white: #ffffff;
        }

        /* --- MODE SOMBRE --- */
        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-blue: #4d88ff;
            --accent-grey: #333333;
            --text-main: #fdfdfd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        body.rtl { direction: rtl; }

        /* --- ACCUEIL VIDEO --- */
        .hero { position: relative; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; }
        #user-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; z-index: -1; transform: translate(-50%, -50%); object-fit: cover; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 0; }
        .hero-content { z-index: 1; padding: 20px; }
        .hero-content h1 { font-size: 2.8rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; font-weight: 900; }
        .expression { font-size: 1.1rem; font-weight: 300; margin-bottom: 40px; }
        .btn-start { padding: 18px 40px; border: 2px solid white; border-radius: 50px; color: white; text-decoration: none; font-weight: bold; text-transform: uppercase; display: inline-block; margin-bottom: 50px; }
        .contact-bar { display: flex; gap: 30px; justify-content: center; }
        .contact-bar a { color: white; text-decoration: none; font-size: 1.5rem; text-align: center; }
        .contact-bar span { display: block; font-size: 0.6rem; text-transform: uppercase; margin-top: 5px; font-weight: bold; }

        /* --- INTERFACE MENU --- */
        #menu-ui { display: none; padding-top: 80px; padding-bottom: 110px; }
        header { position: fixed; top: 0; width: 100%; height: 70px; background: var(--bg-color); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; border-bottom: 1px solid var(--accent-grey); }
        .brand-area { display: flex; align-items: center; gap: 10px; font-weight: 900; color: var(--primary-blue); text-transform: uppercase; }
        .controls { display: flex; align-items: center; gap: 15px; }

        .cat-nav { display: flex; gap: 10px; padding: 10px 15px; position: sticky; top: 70px; background: var(--bg-color); z-index: 999; }
        .cat-btn { flex: 1; height: 45px; border-radius: 25px; border: 1px solid var(--primary-blue); background: var(--card-bg); color: var(--primary-blue); font-weight: bold; }
        .cat-btn.active { background: var(--primary-blue); color: white; }

        .list-container { display: none; padding: 15px; flex-direction: column; gap: 15px; }
        .list-container.active { display: flex; }
        .item-row { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid var(--accent-grey); display: flex; align-items: center; padding: 10px; }
        .img-box { width: 90px; height: 90px; min-width: 90px; border-radius: 10px; overflow: hidden; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .item-details { flex: 1; padding: 0 15px; }
        .item-name { font-weight: 700; font-size: 1rem; }
        .item-price { font-weight: 800; color: var(--primary-blue); margin-top: 4px; }
        .add-btn { width: 40px; height: 40px; background: var(--primary-blue); color: white; border-radius: 50%; border: none; font-size: 1.4rem; }

        /* --- PANIER --- */
        #cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; height: 60px; background: var(--primary-blue); color: white; border-radius: 30px; display: none; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 1500; font-weight: bold; }
        #cart-screen { display: none; position: fixed; inset: 0; background: var(--bg-color); z-index: 2000; padding: 20px; overflow-y: auto; }
        .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--accent-grey); }
        .qty-controls { display: flex; align-items: center; gap: 10px; background: var(--accent-grey); border-radius: 20px; padding: 5px 12px; }
        .qty-btn { background: none; border: none; font-size: 1.2rem; font-weight: bold; color: var(--primary-blue); width: 20px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary-blue); }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--accent-grey); border-radius: 10px; background: var(--card-bg); color: var(--text-main); }
        .btn-wa { width: 100%; height: 55px; background: #28a745; color: white; border: none; border-radius: 12px; font-weight: 800; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="hero" class="hero">
        <video autoplay muted loop playsinline id="user-video"><source src="hero-video.mp4" type="video/mp4"></video>
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Newborn K.oz</h1>
            <p class="expression" id="hero-desc">"L'authentique Pizza au Feu de Bois."</p>
            <a href="#" class="btn-start" onclick="showMenu()" id="btn-txt">Voir le menu</a>
            <div class="contact-bar">
                <a href="tel:+213659235094"><i class="fas fa-phone-alt"></i><span id="call-txt">Appeler</span></a>
                <a href="#"><i class="fab fa-instagram"></i><span>Instagram</span></a>
                <a href="#"><i class="fas fa-map-marker-alt"></i><span id="loc-txt">Adresse</span></a>
            </div>
        </div>
    </div>

    <div id="menu-ui">
        <header>
            <div class="brand-area">
                <i class="fas fa-phone-alt" style="font-size: 0.9rem;"></i>
                <span>Newborn K.oz</span>
            </div>
            <div class="controls">
                <i class="fas fa-moon" id="dark-icon" onclick="toggleDarkMode()" style="cursor:pointer; color:var(--primary-blue); font-size:1.2rem;"></i>
                <select id="lang-select" onchange="changeLang()" style="border:none; background:transparent; font-weight:bold; color:var(--text-main);">
                    <option value="fr">FR</option>
                    <option value="ar">AR</option>
                </select>
            </div>
        </header>

        <div class="cat-nav">
            <button class="cat-btn active" id="cat-p" onclick="tab('pizzas', this)">Pizzas</button>
            <button class="cat-btn" id="cat-b" onclick="tab('boissons', this)">Boissons</button>
        </div>

        <div id="p-list" class="list-container active"></div>
        <div id="b-list" class="list-container"></div>
    </div>

    <div id="cart-bar" onclick="showCheckout()">
        <span id="cart-bar-txt"><i class="fas fa-shopping-basket"></i> MON PANIER</span>
        <span id="bar-total">0 DZD</span>
    </div>

    <div id="cart-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="cart-title" style="color:var(--primary-blue);">Ma Commande</h2>
            <i class="fas fa-times" style="font-size:1.5rem;" onclick="closeCheckout()"></i>
        </div>
        <div id="cart-items-list"></div>
        <div style="display:flex; justify-content:space-between; font-weight:900; font-size:1.3rem; margin:20px 0; color:var(--primary-blue);">
            <span>TOTAL</span><span id="final-total">0 DZD</span>
        </div>
        <form id="orderForm">
            <div class="form-group"><label id="label-name">Nom complet</label><input type="text" id="name" required></div>
            <div class="form-group"><label id="label-phone">Téléphone</label><input type="tel" id="phone" required></div>
            <button type="submit" class="btn-wa" id="btn-wa-txt">COMMANDER SUR WHATSAPP</button>
        </form>
    </div>

    <script>
        const translations = {
            fr: {
                heroDesc: '"L\'authentique Pizza au Feu de Bois."',
                btnTxt: "Voir le menu",
                call: "Appeler",
                loc: "Adresse",
                catP: "Pizzas",
                catB: "Boissons",
                cartBar: "MON PANIER",
                cartTitle: "Ma Commande",
                labelName: "Nom complet",
                labelPhone: "Téléphone",
                btnWa: "COMMANDER SUR WHATSAPP"
            },
            ar: {
                heroDesc: '"بيتزا أصلية على حطب الغابة"',
                btnTxt: "عرض القائمة",
                call: "اتصال",
                loc: "الموقع",
                catP: "بيتزا",
                catB: "مشروبات",
                cartBar: "سلتي",
                cartTitle: "طلبيتي",
                labelName: "الاسم الكامل",
                labelPhone: "رقم الهاتف",
                btnWa: "إرسال عبر واتساب"
            }
        };

        const menu = {
            pizzas: [
                {id:1, n:{fr:'Marguerite', ar:'مارغريتا'}, p:500, img:'p1.jpg'},
                {id:2, n:{fr:'Végétarienne', ar:'نباتية'}, p:750, img:'p2.jpg'},
                {id:3, n:{fr:'Thon', ar:'تونة'}, p:850, img:'p3.jpg'},
                {id:4, n:{fr:'4 Fromages', ar:'4 أجبان'}, p:950, img:'p4.jpg'}
            ],
            boissons: [
                {id:5, n:{fr:'Coca 33cl', ar:'كوكا 33سل'}, p:150, img:'b1.jpg'},
                {id:6, n:{fr:'Eau 1.5L', p:100, ar:'ماء 1.5ل'}, img:'b2.jpg'}
            ]
        };

        let cart = [];
        let currentLang = 'fr';

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('dark-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        function changeLang() {
            currentLang = document.getElementById('lang-select').value;
            document.body.classList.toggle('rtl', currentLang === 'ar');
            const t = translations[currentLang];
            
            document.getElementById('hero-desc').innerText = t.heroDesc;
            document.getElementById('btn-txt').innerText = t.btnTxt;
            document.getElementById('call-txt').innerText = t.call;
            document.getElementById('loc-txt').innerText = t.loc;
            document.getElementById('cat-p').innerText = t.catP;
            document.getElementById('cat-b').innerText = t.catB;
            document.getElementById('cart-bar-txt').innerHTML = `<i class="fas fa-shopping-basket"></i> ${t.cartBar}`;
            document.getElementById('cart-title').innerText = t.cartTitle;
            document.getElementById('label-name').innerText = t.labelName;
            document.getElementById('label-phone').innerText = t.labelPhone;
            document.getElementById('btn-wa-txt').innerText = t.btnWa;
            render();
        }

        function showMenu() {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('menu-ui').style.display = 'block';
            render();
        }

        function tab(t, b) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            document.querySelectorAll('.list-container').forEach(g => g.classList.remove('active'));
            document.getElementById(t === 'pizzas' ? 'p-list' : 'b-list').classList.add('active');
        }

        function render() {
            ['pizzas', 'boissons'].forEach(c => {
                const g = document.getElementById(c === 'pizzas' ? 'p-list' : 'b-list');
                g.innerHTML = menu[c].map(i => `
                    <div class="item-row">
                        <div class="img-box"><img src="${i.img}" onerror="this.parentElement.style.display='none'"></div>
                        <div class="item-details">
                            <div class="item-name">${i.n[currentLang]}</div>
                            <div class="item-price">${i.p} DZD</div>
                        </div>
                        <button class="add-btn" onclick="changeQty(${i.id}, 1, '${c}')">+</button>
                    </div>
                `).join('');
            });
        }

        function changeQty(id, delta, cat = null) {
            const itemInCart = cart.find(i => i.id === id);
            if (itemInCart) {
                itemInCart.qty += delta;
                if (itemInCart.qty <= 0) cart = cart.filter(i => i.id !== id);
            } else if (delta > 0) {
                const source = cat ? menu[cat] : [...menu.pizzas, ...menu.boissons];
                const item = source.find(i => i.id === id);
                cart.push({...item, qty: 1});
            }
            updateUI();
        }

        function updateUI() {
            const total = cart.reduce((s, i) => s + (i.p * i.qty), 0);
            document.getElementById('cart-bar').style.display = cart.length > 0 ? 'flex' : 'none';
            document.getElementById('bar-total').innerText = total + " DZD";
            if(document.getElementById('cart-screen').style.display === 'block') renderCheckout();
        }

        function renderCheckout() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <div style="flex:1">
                        <div style="font-weight:700">${i.n[currentLang]}</div>
                        <div style="color:var(--primary-blue); font-weight:800;">${i.p * i.qty} DZD</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="changeQty(${i.id}, -1)">-</button>
                        <span style="font-weight:800">${i.qty}</span>
                        <button class="qty-btn" onclick="changeQty(${i.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('final-total').innerText = cart.reduce((s, i) => s + (i.p * i.qty), 0) + " DZD";
        }

        function showCheckout() { document.getElementById('cart-screen').style.display = 'block'; renderCheckout(); }
        function closeCheckout() { document.getElementById('cart-screen').style.display = 'none'; }

        document.getElementById('orderForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const n = document.getElementById('name').value;
            const p = document.getElementById('phone').value;
            let msg = `*NEWBORN K.OZ*\nClient: ${n}\nTél: ${p}\n\nArticles:\n` + cart.map(i => `- ${i.qty}x ${i.n.fr}`).join('\n');
            msg += `\n\n*TOTAL: ${cart.reduce((s,i)=>s+(i.p*i.qty),0)} DZD*`;
            window.open(`https://wa.me/213659235094?text=${encodeURIComponent(msg)}`, '_blank');
        });
    </script>
</body>
</html>
